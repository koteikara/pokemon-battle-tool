kind = "web"
previewPath = "/"
title = "ポケモン対戦支援ツール"
version = "1.0.0"
id = "artifacts/pokemon-battle-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19488

[services.development]
run = "pnpm --filter @workspace/pokemon-battle-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokemon-battle-tool", "run", "build" ]
publicDir = "artifacts/pokemon-battle-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19488"
BASE_PATH = "/"
